# ---------------------------------------------------------------------------
# Titanomachy
# ---------------------------------------------------------------------------

# Ten years of war, measured in blood. The war ends (and Kronos becomes killable)
# once this many cross-faction kills have happened. Tune to your population:
# ~2 kills per player is a good afternoon.
war:
  kills-to-end: 200
  # Announce the tally every N kills.
  announce-every: 25
